<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Woody · Procurement</title>
<link rel="icon" href="icons/hwoodicon.svg">
<link rel="stylesheet" href="kit.css">
<link rel="stylesheet" href="procurement.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="engine.js"></script>
<script src="seed.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function App() {
  const [items, setItems] = useState(() => {
    const stored = localStorage.getItem('woody-proc:items');
    if (stored) {
      try { return JSON.parse(stored); } catch (e) {}
    }
    return SEED_DATA.items;
  });
  const [active, setActive] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [openItemId, setOpenItemId] = useState(null);
  const [editing, setEditing] = useState(null); // item being edited (null) or {} for new
  const [toast, setToast] = useState(null);

  useEffect(() => {
    const a = localStorage.getItem('woody-proc:active'); if (a) setActive(a);
    const c = localStorage.getItem('woody-proc:collapsed'); if (c === '1') setCollapsed(true);
    const o = localStorage.getItem('woody-proc:openItem'); if (o) setOpenItemId(o);
  }, []);
  useEffect(() => { localStorage.setItem('woody-proc:active', active); }, [active]);
  useEffect(() => { localStorage.setItem('woody-proc:collapsed', collapsed?'1':'0'); }, [collapsed]);
  useEffect(() => { localStorage.setItem('woody-proc:openItem', openItemId || ''); }, [openItemId]);
  useEffect(() => { localStorage.setItem('woody-proc:items', JSON.stringify(items)); }, [items]);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2400);
    return () => clearTimeout(t);
  }, [toast]);

  // Compute reports for all items
  const reports = useMemo(() =>
    items.map(it => ProcEngine.calcItem(it, it.venues, it.warehouse)),
    [items]
  );

  const titles = {
    dashboard: 'Dashboard',
    items: 'Items',
    orders: 'Purchase Orders',
    par: 'PAR Advisor',
    venues: 'Venues',
    suppliers: 'Suppliers',
    history: 'History',
  };

  const updateItem = (next) => {
    setItems(items.map(i => i.id === next.id ? next : i));
  };

  const addItems = (newItems) => {
    setItems(prev => [...prev, ...newItems]);
  };

  const applyDepletion = (matches) => {
    setItems(prev => prev.map(it => {
      const venueUpdates = matches.filter(m => m.itemId === it.id);
      if (venueUpdates.length === 0) return it;
      return { ...it, venues: it.venues.map(v => {
        const u = venueUpdates.find(x => x.venueName === v.name);
        return u ? { ...v, monthlyDemand: u.observed } : v;
      })};
    }));
  };

  const saveEdit = (draft) => {
    if (draft.id) {
      updateItem(draft);
      setToast(`${draft.name} updated`);
    } else {
      const id = (draft.name || 'item').toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + Date.now().toString(36);
      const newItem = {
        ...draft, id,
        venues: [{ name: 'Delilah LA', par: 30, monthlyDemand: 5, currentOnHand: 0, reorderTriggerMonths: 2.5 }],
        warehouse: { reviewPeriod: 7, maxSimultaneousVenues: 2, currentOnHand: 0, currentOnPO: 0, overrideS: null, overrideBigS: null },
      };
      setItems([...items, newItem]);
      setOpenItemId(id);
      setActive('items');
      setToast(`${draft.name} created`);
    }
    setEditing(null);
  };

  // shared topbar actions
  const actions = (
    <>
      <IconBtn name="help-outlined" title="Help"/>
      <IconBtn name="sms" title="Messages"/>
      {active === 'items' && !openItemId && <Btn size="sm" leading="plus-bkg" onClick={()=>setEditing({ name:'', sku:'', category:'OS&E', subcategory:'Bar Tools', caseSize:12, unitCost:null, shippingCost:null, shippingType:'flat', supplier:'', supplierContact:'', leadTime:14 })}>New Item</Btn>}
    </>
  );

  const openItem = openItemId ? items.find(i => i.id === openItemId) : null;
  const openReport = openItem ? reports.find(r => r.item.id === openItem.id) : null;

  let title = titles[active];
  let crumbs = `Woody · ${title}`;
  if (openItem && active === 'items') {
    title = openItem.name;
    crumbs = `Woody · Items · ${openItem.name}`;
  }

  return (
    <div className={`app ${collapsed ? 'collapsed' : ''}`} data-screen-label={openItem ? `items/${openItem.id}` : active}>
      <Sidebar active={active} setActive={(a)=>{ setActive(a); setOpenItemId(null); }} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <div className="main">
        <Topbar title={title} crumbs={crumbs} actions={actions}/>
        <div className="page">
          {active === 'dashboard' && <DashboardPage items={items} reports={reports} gotoItem={(id)=>{ setActive('items'); setOpenItemId(id); }} gotoTab={setActive}/>}

          {active === 'items' && !openItem && <ItemsPage items={items} reports={reports} gotoItem={setOpenItemId} openNew={()=>setEditing({ name:'', sku:'', category:'OS&E', subcategory:'Bar Tools', caseSize:12, unitCost:null, shippingCost:null, shippingType:'flat', supplier:'', supplierContact:'', leadTime:14 })} onImport={addItems} onToast={setToast}/>}

          {active === 'items' && openItem && (
            <ItemDetail
              item={openItem}
              report={openReport}
              onBack={()=>setOpenItemId(null)}
              onEdit={()=>setEditing(openItem)}
              onUpdate={updateItem}
            />
          )}

          {active === 'par' && <ParAdvisorPage items={items} reports={reports} onApplyDepletion={applyDepletion} onToast={setToast}/>}

          {active === 'orders' && <OrdersPage items={items} reports={reports} recentPOs={SEED_DATA.recentPOs}/>}

          {(active === 'venues' || active === 'suppliers' || active === 'history') && (
            <ComingSoonPage title={titles[active]} active={active} items={items}/>
          )}
        </div>
      </div>

      {editing && <ItemEditModal item={editing} onSave={saveEdit} onClose={()=>setEditing(null)}/>}

      <Toast msg={toast}/>
    </div>
  );
}

function ComingSoonPage({ title, active, items }) {
  // a non-empty placeholder showing real data
  if (active === 'suppliers') {
    const suppliers = {};
    items.forEach(i => {
      if (!suppliers[i.supplier]) suppliers[i.supplier] = { name: i.supplier, contact: i.supplierContact, items: [], leadTime: 0 };
      suppliers[i.supplier].items.push(i);
      suppliers[i.supplier].leadTime = Math.max(suppliers[i.supplier].leadTime, i.leadTime);
    });
    return (
      <Card title="Suppliers" right={<Btn size="sm" variant="ghost" leading="plus-bkg">Add Supplier</Btn>}>
        <table className="tbl">
          <thead><tr><th>Supplier</th><th>Contact</th><th className="right">Items</th><th className="right">Max Lead Time</th><th>Service Level</th></tr></thead>
          <tbody>
            {Object.values(suppliers).map(s => (
              <tr key={s.name}>
                <td><div className="name">{s.name}</div></td>
                <td className="muted" style={{fontSize:13}}>{s.contact}</td>
                <td className="right num">{s.items.length}</td>
                <td className="right num">{s.leadTime}d</td>
                <td><Pill tone="ok">95%</Pill></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    );
  }
  if (active === 'venues') {
    const venues = {};
    items.forEach(i => i.venues.forEach(v => {
      if (!venues[v.name]) venues[v.name] = { name: v.name, items: 0, totalPar: 0, monthly: 0 };
      venues[v.name].items++;
      venues[v.name].totalPar += v.par;
      venues[v.name].monthly += v.monthlyDemand;
    }));
    return (
      <Card title="Venues">
        <table className="tbl">
          <thead><tr><th>Venue</th><th className="right">Items Stocked</th><th className="right">Total PAR</th><th className="right">Monthly Demand</th></tr></thead>
          <tbody>
            {Object.values(venues).map(v => (
              <tr key={v.name}>
                <td><div className="name">{v.name}</div></td>
                <td className="right num">{v.items}</td>
                <td className="right num">{v.totalPar}</td>
                <td className="right num">{v.monthly.toFixed(1)}/mo</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    );
  }
  // history
  return (
    <Card title="History">
      <table className="tbl">
        <thead><tr><th>Date</th><th>PO #</th><th>Item</th><th>Destination</th><th className="right">Units</th><th className="right">Total</th><th>Status</th></tr></thead>
        <tbody>
          {SEED_DATA.recentPOs.map(p => (
            <tr key={p.id}>
              <td className="num">{p.placed}</td>
              <td><b style={{fontFamily:'var(--font-mono)', fontSize:13}}>{p.id}</b></td>
              <td>{p.item}</td>
              <td>{p.dest}</td>
              <td className="right num">{p.units}</td>
              <td className="right num">${p.total.toFixed(2)}</td>
              <td>{p.status === 'received' ? <Pill tone="ok">Received</Pill> : p.status === 'in-transit' ? <Pill tone="info">In Transit</Pill> : <Pill tone="warn">Placed</Pill>}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </Card>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
